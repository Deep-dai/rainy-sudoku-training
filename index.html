<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#3ab7a6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Rainy 数独">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Rainy 数独训练</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./app-icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./app-icon.svg">
    <link rel="stylesheet" href="./styles.css?v=10">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar" aria-label="应用标题">
        <div class="brand">
          <svg class="mascot" viewBox="0 0 72 72" role="img" aria-label="小雨伞伙伴">
            <path d="M12 34c4-16 15-24 28-24s24 8 28 24H12Z" fill="#ffcf56"/>
            <path d="M16 34c4-9 12-14 24-14s20 5 24 14" fill="#ff8f70"/>
            <path d="M39 34v18c0 6-4 10-10 10-5 0-9-3-9-8" fill="none" stroke="#36536b" stroke-width="5" stroke-linecap="round"/>
            <circle cx="28" cy="39" r="2.5" fill="#36536b"/>
            <circle cx="50" cy="39" r="2.5" fill="#36536b"/>
            <path d="M32 48c5 4 11 4 16 0" fill="none" stroke="#36536b" stroke-width="4" stroke-linecap="round"/>
          </svg>
          <div>
            <h1>Rainy 数独训练</h1>
            <p>6 宫格和 9 宫格比赛练习</p>
          </div>
        </div>
        <button class="sound-button" id="soundButton" type="button" aria-label="切换声音" aria-pressed="true">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 9v6h4l5 4V5L8 9H4Z"></path>
            <path d="M16 9c1 1 1.5 2 1.5 3S17 14 16 15"></path>
            <path d="M18.5 6.5A7 7 0 0 1 21 12a7 7 0 0 1-2.5 5.5"></path>
          </svg>
          声音
        </button>
      </header>

      <section class="control-band" aria-label="练习设置">
        <div class="control-group">
          <span class="control-label">棋盘</span>
          <div class="segmented" role="group" aria-label="选择棋盘">
            <button type="button" class="segment is-active" data-setting="size" data-value="6">6 宫格</button>
            <button type="button" class="segment" data-setting="size" data-value="9">9 宫格</button>
          </div>
        </div>

        <div class="control-group difficulty-group">
          <span class="control-label">难度</span>
          <div class="segmented difficulty-segmented" role="group" aria-label="选择难度">
            <button type="button" class="segment is-active" data-setting="difficulty" data-value="super">超级简单</button>
            <button type="button" class="segment" data-setting="difficulty" data-value="very">非常简单</button>
            <button type="button" class="segment" data-setting="difficulty" data-value="easy">简单</button>
            <button type="button" class="segment" data-setting="difficulty" data-value="expert">高手难度</button>
            <button type="button" class="segment" data-setting="difficulty" data-value="master">超级高手</button>
          </div>
        </div>

        <div class="control-group">
          <span class="control-label">模式</span>
          <div class="segmented" role="group" aria-label="选择模式">
            <button type="button" class="segment is-active" data-setting="mode" data-value="practice">练习</button>
            <button type="button" class="segment" data-setting="mode" data-value="race">比赛</button>
          </div>
        </div>

        <label class="timer-config" for="durationInput">
          <span class="control-label">比赛倒计时</span>
          <span class="timer-input-wrap">
            <input id="durationInput" type="number" min="1" max="60" step="1" value="10" inputmode="numeric">
            <span>分钟</span>
          </span>
        </label>

        <div class="control-group timer-display-group">
          <span class="control-label">计时显示</span>
          <div class="segmented" role="group" aria-label="切换计时显示">
            <button type="button" class="segment is-active" data-setting="timerVisible" data-value="on">开</button>
            <button type="button" class="segment" data-setting="timerVisible" data-value="off">关</button>
          </div>
        </div>

        <button class="primary-button" id="newGameButton" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 12a7 7 0 0 1 12-5"></path>
            <path d="M17 3v5h-5"></path>
            <path d="M19 12a7 7 0 0 1-12 5"></path>
            <path d="M7 21v-5h5"></path>
          </svg>
          新题开始
        </button>
      </section>

      <section class="game-layout">
        <section class="board-panel" aria-label="数独棋盘区域">
          <div class="status-strip" aria-live="polite">
            <div class="status-pill timer-pill">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="13" r="8"></circle>
                <path d="M12 9v5l3 2"></path>
                <path d="M9 2h6"></path>
              </svg>
              <span id="timerLabel">00:00</span>
            </div>
            <div class="status-pill">
              <span id="modeLabel">练习模式</span>
            </div>
            <div class="status-pill">
              <span id="progressLabel">0/0</span>
            </div>
          </div>

          <div class="message-line" id="messageLine">选择一个格子，再点下面的数字。</div>

          <div class="board-wrap">
            <div class="sudoku-board" id="sudokuBoard" aria-label="数独棋盘"></div>
          </div>
        </section>

        <aside class="side-panel" aria-label="操作区域">
          <div class="action-grid">
            <button class="tool-button" id="noteButton" type="button" aria-pressed="false">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 19h14"></path>
                <path d="M7 16 17.5 5.5a2 2 0 0 1 3 3L10 19H7v-3Z"></path>
              </svg>
              草稿
            </button>
            <button class="tool-button" id="eraseButton" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m7 21-4-4 10-10 4 4L7 21Z"></path>
                <path d="M14 6 17 3l4 4-3 3"></path>
                <path d="M9 21h12"></path>
              </svg>
              擦除
            </button>
            <button class="tool-button practice-only" id="hintButton" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9 18h6"></path>
                <path d="M10 22h4"></path>
                <path d="M8 14a6 6 0 1 1 8 0c-1 1-1 2-1 3H9c0-1 0-2-1-3Z"></path>
              </svg>
              提示
            </button>
            <button class="tool-button submit-button" id="submitButton" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m12 3 1.7 3.5 3.8.5-2.8 2.7.7 3.8-3.4-1.8-3.4 1.8.7-3.8L6.5 7l3.8-.5L12 3Z"></path>
                <path d="M5 16c2 0 3 1 3 3"></path>
                <path d="M19 16c-2 0-3 1-3 3"></path>
              </svg>
              <span id="submitLabel">交作业</span>
            </button>
          </div>

          <div class="coach-box" id="coachBox">
            <h2>小教练</h2>
            <p id="coachText">先自己观察行、列和宫，填完后再认真复盘。</p>
          </div>
        </aside>
      </section>

      <div class="number-pad floating-pad is-hidden" id="numberPad" aria-label="数字键盘" aria-hidden="true"></div>
    </main>

    <dialog class="result-dialog" id="resultDialog">
      <div class="result-content">
        <h2 id="resultTitle">完成</h2>
        <p id="resultText"></p>
        <div class="result-actions">
          <button class="tool-button" id="closeResultButton" type="button">继续看题</button>
          <button class="primary-button" id="resultNewButton" type="button">再来一题</button>
        </div>
      </div>
    </dialog>

    <script src="./scripts/app-state.js?v=10" defer></script>
    <script src="./scripts/app-game.js?v=10" defer></script>
    <script src="./scripts/app-ui.js?v=10" defer></script>
    <script src="./scripts/app-rules.js?v=10" defer></script>
    <script src="./scripts/app-utils.js?v=10" defer></script>
  </body>
</html>
